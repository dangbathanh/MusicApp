services:
  db:
    image: postgres:16-alpine
    container_name: music_db_container
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  master:
    image: chrislusf/seaweedfs
    container_name: seaweed_master
    command: master -ip=master
    ports:
      - "9333:9333"

  volume:
    image: chrislusf/seaweedfs
    container_name: seaweed_volume
    command: "volume -mserver=master:9333 -port=8080 -ip=volume -max=100"
    depends_on:
      - master
    volumes:
      - ./data:/data

  filer:
    image: chrislusf/seaweedfs
    container_name: seaweed_filer
    command: filer -master=master:9333
    depends_on:
      - master
      - volume
    volumes:
      - ./data:/data

  s3:
    image: chrislusf/seaweedfs
    container_name: seaweed_s3
    command: s3 -filer=filer:8888 -ip.bind=0.0.0.0
    ports:
      - "8333:8333"
    depends_on:
      - filer

  nginx:
    image: nginx:alpine
    container_name: music_nginx
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - filer

  redis:
    image: redis:7-alpine
    container_name: music_redis
    command: redis-server --protected-mode no
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: